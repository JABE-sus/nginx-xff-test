version: "3.9"

networks:
  proxy_net:
    driver: bridge

services:
  app:
    build: ./app
    container_name: app
    networks:
      - proxy_net

  # nginx3 — внутренний, виден только другим nginx, до приложения
  nginx3:
    image: nginx:alpine
    container_name: nginx3
    volumes:
      - ./nginx3/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy_net
    depends_on:
      - app

  # nginx2 — промежуточный
  nginx2:
    image: nginx:alpine
    container_name: nginx2
    volumes:
      - ./nginx2/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy_net
    depends_on:
      - nginx3

  # nginx1 — edge, смотрит наружу, порты проброшены на хост
  nginx1:
    image: nginx:alpine
    container_name: nginx1
    volumes:
      - ./nginx1/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"   # прямо на приложение через nginx1
    networks:
      - proxy_net
    depends_on:
      - nginx2
      - nginx3
      - app

  # Дополнительный edge-прокси для цепочки nginx1->nginx2->nginx3->app
  nginx_chain:
    image: nginx:alpine
    container_name: nginx_chain
    volumes:
      - ./nginx1/nginx_chain.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8082:80"   # цепочка через все три nginx
    networks:
      - proxy_net
    depends_on:
      - nginx2
